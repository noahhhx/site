services:
  site:
    image: ghcr.io/noahhhx/site:latest
    container_name: site
    restart: unless-stopped
    ports:
      - "8080:8080"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 site
